name: Send Morning Notification

on:
  schedule:
    # 02:00 UTC = 7:30 AM IST. Deliberately later than daily-edition.yml's
    # 2:00 AM IST generation run, so content is guaranteed ready before this
    # notification tells people to go read it.
    - cron: "30 22 * * *"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning notification
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python send_morning_notification.py
